databaseChangeLog:
  - changeSet:
      id: 004
      author: bilelbanelhaq
      changes:
        - createTable:
            tableName: skill
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: program_progress_id
                  type: UUID
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: skill
            baseColumnNames: program_progress_id
            referencedTableName: program_progress
            referencedColumnNames: id
            constraintName: fk_skill_program_progress
