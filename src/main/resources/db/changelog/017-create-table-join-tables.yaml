databaseChangeLog:
  - changeSet:
      id: 010-1
      author: bilelbanelhaq
      changes:
        - createTable:
            tableName: trace_ams
            columns:
              - column:
                  name: trace_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: ams_id
                  type: UUID
                  constraints:
                    nullable: false
        - sql:
            dbms: 'postgresql'
            endDelimiter: \nGO
            splitStatements: true
            sql: ALTER TABLE trace_ams OWNER TO ${avenirs.admin.role}
            stripComments: true

        - addForeignKeyConstraint:
            baseTableName: trace_ams
            baseColumnNames: trace_id
            referencedTableName: trace
            referencedColumnNames: id
            constraintName: fk_trace_ams_trace
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: trace_ams
            baseColumnNames: ams_id
            referencedTableName: ams
            referencedColumnNames: id
            constraintName: fk_trace_ams_ams
            onDelete: CASCADE

  - changeSet:
      id: 010-2
      author: bilelbanelhaq
      changes:
        - createTable:
            tableName: skill_skill_level
            columns:
              - column:
                  name: skill_id
                  type: UUID

                  constraints:
                    nullable: false
              - column:
                  name: skill_level_id
                  type: UUID
                  constraints:
                    nullable: false
        - sql:
            dbms: 'postgresql'
            endDelimiter: \nGO
            splitStatements: true
            sql: ALTER TABLE skill_skill_level OWNER TO ${avenirs.admin.role}
            stripComments: true

        - addForeignKeyConstraint:
            baseTableName: skill_skill_level
            baseColumnNames: skill_id
            referencedTableName: skill
            referencedColumnNames: id
            constraintName: fk_skill_skill_level_skill
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: skill_skill_level
            baseColumnNames: skill_level_id
            referencedTableName: skill_level
            referencedColumnNames: id
            constraintName: fk_skill_skill_level_skill_level
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: skill_skill_level
            columnNames: skill_id, skill_level_id
            constraintName: uq_skill_skill_level

  - changeSet:
      id: 010-3
      author: Nathan PIGNON
      changes:
        - createTable:
            tableName: training_path_skill_level
            columns:
              - column:
                  name: training_path_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: skill_level_id
                  type: UUID
                  constraints:
                    nullable: false
        - sql:
            dbms: 'postgresql'
            endDelimiter: \nGO
            splitStatements: true
            sql: ALTER TABLE training_path_skill_level OWNER TO ${avenirs.admin.role}
            stripComments: true

        - addForeignKeyConstraint:
            baseTableName: training_path_skill_level
            baseColumnNames: training_path_id
            referencedTableName: training_path
            referencedColumnNames: id
            constraintName: fk_training_path_skill_level_training_path
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: training_path_skill_level
            baseColumnNames: skill_level_id
            referencedTableName: skill_level
            referencedColumnNames: id
            constraintName: fk_training_path_skill_level_skill_level
            onDelete: CASCADE

