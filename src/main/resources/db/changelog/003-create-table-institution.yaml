databaseChangeLog:
  - changeSet:
      id: 007
      author: bilelbanelhaq
      changes:
        - createTable:
            tableName: institution
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: enabled_fields
                  type: TEXT
                  constraints:
                    nullable: true
